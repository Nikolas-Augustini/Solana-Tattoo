<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | Solana Tattoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/booking.css">
</head>
<body>
    <div class="menu-toggle">
        <img src="images/menu.png" class="menu-icon">
    </div>

    <nav class="side-menu">
        <img src="images/logo.png" class="menu-logo">

        <ul>
            <li><a href="#">Artists</a></li>
            <li><a href="piercing.html">Piercings</a></li>
            <li><a href="tattoo.html">Tattoos</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="booking.html">Booking</a></li>
        </ul>

        <div class="contact">
            <p>Solana Tattoo Company</p>
            <p>1119 W. Elizabeth St.</p>
            <p>Fort Collins, CO</p>
            <p>970-666-4842</p>
            <p>solanatattoo@gmail.com</p>
        </div>
    </nav>

    <header class="top-bar">
        <div class="logo-text">Solana Tattoo Company</div>
    </header>

    <div class="booking-wrapper">
        <form class="booking-form">
            <h2>Booking</h2>

            <div class="form-group two-col">
                <label>Name</label>
                <input type="text" placeholder="First" required>
                <input type="text" placeholder="Last" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" required>
            </div>

            <div class="form-group two-col">
                <label>Contact</label>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Phone" required>
            </div>

            <div class="form-group">
                <label>Appointment Info</label>
                <select required>
                    <option value="" disabled selected hidden>Select an appointment type</option>
                    <option value="piercing">Piercing</option>
                    <option value="tattoo">Tattoo</option>
                    <option value="tattoo-consult">Tattoo Consultation</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea placeholder="Describe your idea..."></textarea>
            </div>

            <div class="form-group check-group">
                <label><input type="checkbox" required> I agree to terms and services</label>
                <label><input type="checkbox" required> I agree to privacy policy</label>
            </div>

            <button class="submit-btn">Submit</button>
        </form>
    </div>

    <script src="javascript/menu.js"></script>
</body>
</html>
